name: Check Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3

      - name: Setup .NET 10
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 #v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Get current version
        id: current-version
        run: |
          echo "version=$(grep -oP '(?<=<Version>)[^<]+' DefraDigital.Example.Greetings/DefraDigital.Example.Greetings.csproj)" >> $GITHUB_OUTPUT

      - name: Get main branch version
        id: base-version
        run: |
          git fetch origin main --depth=1
          echo "version=$(git show origin/main:DefraDigital.Example.Greetings/DefraDigital.Example.Greetings.csproj | grep -oP '(?<=<Version>)[^<]+')" >> $GITHUB_OUTPUT

      - name: Check version incremented
        run: |
          CURRENT="${{ steps.current-version.outputs.version }}"
          BASE="${{ steps.base-version.outputs.version }}"
          IFS='.' read -r -a CURRENT_PARTS <<< "$CURRENT"
          IFS='.' read -r -a BASE_PARTS <<< "$BASE"
          if [[ ${CURRENT_PARTS[0]} -gt ${BASE_PARTS[0]} ]] || \
             [[ ${CURRENT_PARTS[0]} -eq ${BASE_PARTS[0]} && ${CURRENT_PARTS[1]} -gt ${BASE_PARTS[1]} ]] || \
             [[ ${CURRENT_PARTS[0]} -eq ${BASE_PARTS[0]} && ${CURRENT_PARTS[1]} -eq ${BASE_PARTS[1]} && ${CURRENT_PARTS[2]} -gt ${BASE_PARTS[2]} ]]; then
            echo "Version $CURRENT is greater than base $BASE"
          else
            echo "::error::Version in .csproj ($CURRENT) must be greater than the base branch version ($BASE)"
            exit 1
          fi

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build
